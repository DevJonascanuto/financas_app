{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <h1>{{ title }}</h1>
    <form method="POST">
        {{ form.hidden_tag() }}
        <p>{{ form.descricao.label }}<br>{{ form.descricao() }}</p>
        <p>{{ form.valor.label }}<br>{{ form.valor() }}</p>
        <p>{{ form.data.label }}<br>{{ form.data() }}</p>
        <p>{{ form.submit() }}</p>
    </form>
    <a href="{{ url_for('main.dashboard') }}">Voltar ao Dashboard</a>
</div>
{% endblock %}
