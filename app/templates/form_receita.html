{% extends "base.html" %}
{% block title %}Formulário{% endblock %}
{% block content %}
<h2>Formulário</h2>
<form method="POST">
    {{ form.hidden_tag() }}
    {{ form.descricao.label }} {{ form.descricao() }}
    {{ form.valor.label }} {{ form.valor() }}
    {{ form.data.label }} {{ form.data() }}
    {{ form.submit() }}
</form>
<a href="{{ url_for('main.dashboard') }}">Voltar</a>
{% endblock %}
