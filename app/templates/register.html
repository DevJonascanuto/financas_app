{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <h1>Cadastro</h1>
    <form method="POST">
        {{ form.hidden_tag() }}
        <p>{{ form.email.label }}<br>{{ form.email() }}</p>
        <p>{{ form.password.label }}<br>{{ form.password() }}</p>
        <p>{{ form.confirm.label }}<br>{{ form.confirm() }}</p>
        <p>{{ form.submit() }}</p>
    </form>
    <a href="{{ url_for('auth.login') }}">Já tem conta? Faça login</a>
</div>
{% endblock %}
